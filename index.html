<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Quest AR: ภารกิจนักวิทยาการข้อมูล</title>

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Thai Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- MediaPipe Hands CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --cyan: #22d3ee;
      --mint: #34d399;
      --violet: #8b5cf6;
      --blue: #2563eb;
      --dark: #020617;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      font-family: 'Sarabun', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #020617;
      color: #ffffff;
      overflow-x: hidden;
    }

    body {
      touch-action: none;
      background:
        radial-gradient(circle at 12% 18%, rgba(34, 211, 238, 0.22), transparent 28%),
        radial-gradient(circle at 82% 8%, rgba(139, 92, 246, 0.24), transparent 27%),
        radial-gradient(circle at 50% 88%, rgba(52, 211, 153, 0.18), transparent 35%),
        linear-gradient(135deg, #020617 0%, #0f172a 48%, #111827 100%);
    }

    #inputVideo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      filter: blur(1.5px) saturate(1.12) brightness(0.72);
      transition: opacity .35s ease;
      pointer-events: none;
    }

    #inputVideo.active { opacity: 0.55; }
    #inputVideo.mirror { transform: scaleX(-1); }

    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(34, 211, 238, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.08) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 75%);
    }

    .scanline {
      position: fixed;
      left: 0;
      top: -20%;
      width: 100%;
      height: 24%;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.08), transparent);
      animation: scan 6s linear infinite;
    }

    @keyframes scan {
      from { transform: translateY(-20vh); }
      to { transform: translateY(130vh); }
    }

    #app {
      position: relative;
      z-index: 5;
      min-height: 100vh;
    }

    .glass {
      background: rgba(15, 23, 42, 0.62);
      border: 1px solid rgba(148, 163, 184, 0.24);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .glass-soft {
      background: rgba(15, 23, 42, 0.44);
      border: 1px solid rgba(148, 163, 184, 0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .neon-text {
      text-shadow: 0 0 18px rgba(34, 211, 238, 0.45);
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #06b6d4, #10b981);
      color: #fff;
      box-shadow: 0 12px 32px rgba(6, 182, 212, .24);
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }
    .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.07); box-shadow: 0 18px 44px rgba(6, 182, 212, .30); }
    .btn-primary:active { transform: translateY(1px) scale(.99); }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: #e2e8f0;
      transition: background .2s ease, transform .2s ease;
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.16); transform: translateY(-1px); }

    .data-card, .activity-card {
      user-select: none;
      cursor: grab;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .data-card:hover, .activity-card:hover {
      transform: translateY(-3px);
      border-color: rgba(34, 211, 238, 0.72);
      box-shadow: 0 20px 50px rgba(34, 211, 238, 0.13);
    }
    .data-card.dragging, .activity-card.dragging {
      cursor: grabbing;
      transform: scale(1.03) rotate(-1deg);
      box-shadow: 0 28px 70px rgba(34, 211, 238, 0.28);
    }
    .locked {
      cursor: default !important;
    }
    .correct-card {
      background: rgba(16, 185, 129, 0.18) !important;
      border-color: rgba(52, 211, 153, .8) !important;
      box-shadow: 0 0 22px rgba(52, 211, 153, .22) !important;
    }

    .drop-zone {
      min-height: 104px;
      border: 2px dashed rgba(125, 211, 252, 0.35);
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }
    .drop-zone:hover, .drop-zone.active-zone {
      background: rgba(14, 165, 233, 0.12);
      border-color: rgba(34, 211, 238, 0.82);
      transform: translateY(-2px);
    }
    .drop-zone.zone-complete {
      border-style: solid;
      background: rgba(16, 185, 129, 0.12);
      border-color: rgba(52, 211, 153, .8);
    }

    .shake { animation: shake .36s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%, 90% { transform: translateX(-1px); }
      20%, 80% { transform: translateX(2px); }
      30%, 50%, 70% { transform: translateX(-4px); }
      40%, 60% { transform: translateX(4px); }
    }

    .floaty { animation: floaty 5s ease-in-out infinite; }
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .data-chip {
      user-select: none;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .data-chip:hover { transform: scale(1.04); }
    .data-chip.selected-correct {
      background: rgba(16, 185, 129, 0.22) !important;
      border-color: rgba(52, 211, 153, .9) !important;
      box-shadow: 0 0 26px rgba(52, 211, 153, .22);
    }
    .data-chip.selected-wrong {
      background: rgba(244, 63, 94, 0.22) !important;
      border-color: rgba(251, 113, 133, .9) !important;
      box-shadow: 0 0 26px rgba(244, 63, 94, .18);
    }

    #arCursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 2px solid rgba(34, 211, 238, 0.92);
      box-shadow: 0 0 18px rgba(34, 211, 238, 0.85), inset 0 0 14px rgba(34, 211, 238, 0.18);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 99999;
      opacity: 0;
      transition: width .1s ease, height .1s ease, border-color .1s ease, opacity .2s ease;
    }
    #arCursor.visible { opacity: 1; }
    #arCursor.pinching {
      width: 48px;
      height: 48px;
      border-color: rgba(52, 211, 153, .98);
      box-shadow: 0 0 24px rgba(52, 211, 153, .9), inset 0 0 18px rgba(52, 211, 153, .22);
    }

    .quiz-option {
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .quiz-option:hover { transform: translateY(-2px); border-color: rgba(34, 211, 238, .72); }
    .quiz-option.correct { background: rgba(16, 185, 129, 0.20); border-color: rgba(52, 211, 153, .9); }
    .quiz-option.wrong { background: rgba(244, 63, 94, 0.18); border-color: rgba(251, 113, 133, .9); }

    .bar-fill {
      transform-origin: bottom;
      animation: growBar .8s ease forwards;
      transform: scaleY(0);
    }
    @keyframes growBar { to { transform: scaleY(1); } }

    .drag-placeholder {
      border-radius: 1rem;
      border: 1px dashed rgba(125, 211, 252, .36);
      background: rgba(14, 165, 233, .08);
    }

    @media (max-width: 768px) {
      body { touch-action: manipulation; }
      .drop-zone { min-height: 88px; }
      #arCursor { display: none; }
    }
  </style>
</head>
<body>
  <video id="inputVideo" playsinline muted></video>
  <div class="bg-grid"></div>
  <div class="scanline"></div>
  <div id="arCursor"></div>

  <div id="app" class="px-3 py-3 md:px-6 md:py-5">
    <!-- HUD -->
    <header class="glass rounded-3xl p-4 md:p-5 mb-4">
      <div class="flex flex-col xl:flex-row xl:items-center gap-4 justify-between">
        <div>
          <div class="flex items-center gap-2 text-cyan-200 text-sm font-semibold mb-1">
            <span class="inline-flex w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_18px_rgba(52,211,153,.9)]"></span>
            AR Web-Based Learning Game
          </div>
          <h1 class="text-2xl md:text-4xl font-extrabold neon-text leading-tight">Data Quest AR: ภารกิจนักวิทยาการข้อมูล</h1>
          <p class="text-slate-300 mt-1 text-sm md:text-base">เรียนรู้กระบวนการวิทยาการข้อมูลผ่านภารกิจวิเคราะห์ปัญหา “นักเรียนมาโรงเรียนสาย”</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-2 gap-2 min-w-[280px]">
          <div class="glass-soft rounded-2xl p-3">
            <div class="text-xs text-slate-400">ด่าน</div>
            <div id="sceneBadge" class="font-bold text-cyan-200">1 / 5</div>
          </div>
          <div class="glass-soft rounded-2xl p-3">
            <div class="text-xs text-slate-400">คะแนน</div>
            <div id="scoreBadge" class="font-bold text-emerald-300">0 / 100</div>
          </div>
          <div class="glass-soft rounded-2xl p-3">
            <div class="text-xs text-slate-400">เวลา</div>
            <div id="timerBadge" class="font-bold text-violet-200">00:00</div>
          </div>
          <div class="glass-soft rounded-2xl p-3">
            <div class="text-xs text-slate-400">สถานะ</div>
            <div id="statusBadge" class="font-bold text-sky-200 truncate">ใช้โหมดเมาส์</div>
          </div>
        </div>
      </div>

      <div class="mt-4 flex flex-col lg:flex-row gap-3 lg:items-center justify-between">
        <div class="flex-1">
          <div class="h-3 bg-slate-900/60 rounded-full overflow-hidden border border-white/10">
            <div id="progressFill" class="h-full bg-gradient-to-r from-blue-500 via-cyan-400 to-emerald-400 rounded-full transition-all duration-500" style="width: 20%"></div>
          </div>
        </div>
        <div class="flex flex-wrap gap-2">
          <button id="cameraBtn" class="no-drag btn-secondary rounded-xl px-4 py-2 text-sm font-semibold">เปิดกล้อง AR</button>
          <button id="mouseBtn" class="no-drag btn-secondary rounded-xl px-4 py-2 text-sm font-semibold">โหมดเมาส์: เปิด</button>
          <button id="mirrorBtn" class="no-drag btn-secondary rounded-xl px-4 py-2 text-sm font-semibold">Mirror: เปิด</button>
          <button id="resetBtn" class="no-drag btn-secondary rounded-xl px-4 py-2 text-sm font-semibold">เริ่มใหม่</button>
        </div>
      </div>
    </header>

    <!-- Main Stage -->
    <main id="gameStage" class="glass rounded-3xl p-4 md:p-7 min-h-[68vh]"></main>
  </div>

  <!-- Guide Modal -->
  <div id="guideModal" class="fixed inset-0 z-[100000] hidden items-center justify-center p-4 bg-slate-950/72 backdrop-blur-md">
    <div class="glass rounded-3xl p-6 md:p-8 max-w-2xl w-full">
      <div class="flex items-start gap-4">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-cyan-400 to-emerald-400 grid place-items-center text-3xl shadow-[0_0_30px_rgba(34,211,238,.35)]">💡</div>
        <div class="flex-1">
          <h2 id="guideTitle" class="text-2xl md:text-3xl font-extrabold text-cyan-100"></h2>
          <div id="guideBody" class="text-slate-200 leading-relaxed mt-3"></div>
          <button id="guideCloseBtn" class="btn-primary rounded-2xl px-6 py-3 mt-6 font-bold">เข้าใจแล้ว เริ่มด่านนี้</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-6 z-[100001] hidden max-w-[92vw] glass rounded-2xl px-5 py-3 font-semibold text-center"></div>

  <script>
    /* ======================================================
       DATA QUEST AR: Single-file Web-Based Learning Game
       HTML + TailwindCSS + Vanilla JavaScript + MediaPipe Hands
    ====================================================== */

    const GAME = {
      title: 'Data Quest AR: ภารกิจนักวิทยาการข้อมูล',
      scenario: 'โรงเรียนต้องการวิเคราะห์ข้อมูลการมาสายของนักเรียน เพื่อหาแนวทางลดการมาสายอย่างมีเหตุผล',
      steps: [
        { id: 'question', no: 1, label: 'ตั้งคำถาม', full: 'การตั้งคำถาม', icon: '❓', desc: 'กำหนดปัญหาและคำถามที่ต้องการหาคำตอบ' },
        { id: 'collect', no: 2, label: 'เก็บรวบรวมข้อมูล', full: 'การเก็บรวบรวมข้อมูล', icon: '📥', desc: 'รวบรวมข้อมูลที่เกี่ยวข้องและเชื่อถือได้' },
        { id: 'explore', no: 3, label: 'สำรวจข้อมูล', full: 'การสำรวจข้อมูล', icon: '🔎', desc: 'ตรวจสอบข้อมูลซ้ำ ค่าที่หายไป และรูปแบบเบื้องต้น' },
        { id: 'analyze', no: 4, label: 'วิเคราะห์ข้อมูล', full: 'การวิเคราะห์ข้อมูล', icon: '🧠', desc: 'วิเคราะห์แนวโน้ม ความสัมพันธ์ และข้อค้นพบ' },
        { id: 'communicate', no: 5, label: 'สื่อสารผลลัพธ์', full: 'การสื่อสารและทำผลลัพธ์ให้เป็นภาพ', icon: '📊', desc: 'นำเสนอผลด้วยกราฟ ภาพ และข้อเสนอแนะที่เข้าใจง่าย' }
      ],
      activities: [
        { id: 'a1', match: 'question', text: 'ตั้งคำถามว่า “นักเรียนมาสายเพราะอะไร”' },
        { id: 'a2', match: 'collect', text: 'รวบรวมข้อมูลเวลาเข้าโรงเรียนจากระบบสแกนบัตร' },
        { id: 'a3', match: 'explore', text: 'ตรวจสอบข้อมูลซ้ำหรือข้อมูลที่หายไป' },
        { id: 'a4', match: 'analyze', text: 'หาความสัมพันธ์ระหว่างระยะทางบ้านกับการมาสาย' },
        { id: 'a5', match: 'communicate', text: 'สร้างกราฟแสดงจำนวนผู้มาสายในแต่ละวัน' }
      ],
      dataItems: [
        { id: 'd1', label: 'เวลาเข้าโรงเรียน', correct: true, icon: '⏰' },
        { id: 'd2', label: 'ระดับชั้น', correct: true, icon: '🏫' },
        { id: 'd3', label: 'ระยะทางจากบ้าน', correct: true, icon: '📍' },
        { id: 'd4', label: 'วิธีเดินทาง', correct: true, icon: '🚌' },
        { id: 'd5', label: 'จำนวนครั้งที่มาสาย', correct: true, icon: '📌' },
        { id: 'd6', label: 'วันที่มาเรียน', correct: true, icon: '🗓️' },
        { id: 'd7', label: 'สีรองเท้านักเรียน', correct: false, icon: '👟' },
        { id: 'd8', label: 'อาหารที่ชอบ', correct: false, icon: '🍜' }
      ],
      chart: [
        { day: 'จันทร์', value: 45 },
        { day: 'อังคาร', value: 30 },
        { day: 'พุธ', value: 28 },
        { day: 'พฤหัสบดี', value: 25 },
        { day: 'ศุกร์', value: 55 }
      ],
      quiz: [
        {
          question: 'จากกราฟ วันใดมีนักเรียนมาสายมากที่สุด?',
          options: ['วันจันทร์', 'วันอังคาร', 'วันศุกร์', 'วันพุธ'],
          answer: 'วันศุกร์',
          score: 12,
          feedback: 'ถูกต้อง วันศุกร์มีจำนวนผู้มาสายมากที่สุด คือ 55 คน'
        },
        {
          question: 'ข้อเสนอใดเหมาะสมที่สุดจากข้อมูลนี้?',
          options: [
            'เพิ่มกิจกรรมหน้าเสาธงทุกวัน',
            'ตรวจสอบสาเหตุการมาสายช่วงวันจันทร์และศุกร์เพิ่มเติม',
            'ยกเลิกการเข้าแถว',
            'ไม่ต้องทำอะไร เพราะข้อมูลไม่มีประโยชน์'
          ],
          answer: 'ตรวจสอบสาเหตุการมาสายช่วงวันจันทร์และศุกร์เพิ่มเติม',
          score: 13,
          feedback: 'ถูกต้อง ควรตรวจสอบสาเหตุในวันที่มีค่าผิดปกติหรือสูงกว่าวันอื่น โดยเฉพาะวันจันทร์และศุกร์'
        }
      ]
    };

    const state = {
      currentScene: 1,
      gameStarted: false,
      startTime: null,
      timerInterval: null,
      cameraRunning: false,
      mouseMode: true,
      mirrorMode: true,
      handDetected: false,
      handPinching: false,
      lastHandPinching: false,
      cursorX: window.innerWidth / 2,
      cursorY: window.innerHeight / 2,
      dragging: null,
      virtualButtonTarget: null,
      sceneScores: { order: 0, match: 0, select: 0, quiz: 0 },
      orderCorrect: 0,
      matchCorrect: 0,
      selectedCorrect: 0,
      selectedWrong: 0,
      quizIndex: 0,
      quizAnswered: 0,
      scene3NextShown: false,
      scene4Done: false,
      guideWasShown: new Set(),
      audioReady: false,
      audioCtx: null
    };

    let hands = null;
    let camera = null;

    const el = {
      video: document.getElementById('inputVideo'),
      stage: document.getElementById('gameStage'),
      sceneBadge: document.getElementById('sceneBadge'),
      scoreBadge: document.getElementById('scoreBadge'),
      timerBadge: document.getElementById('timerBadge'),
      statusBadge: document.getElementById('statusBadge'),
      progressFill: document.getElementById('progressFill'),
      cameraBtn: document.getElementById('cameraBtn'),
      mouseBtn: document.getElementById('mouseBtn'),
      mirrorBtn: document.getElementById('mirrorBtn'),
      resetBtn: document.getElementById('resetBtn'),
      arCursor: document.getElementById('arCursor'),
      guideModal: document.getElementById('guideModal'),
      guideTitle: document.getElementById('guideTitle'),
      guideBody: document.getElementById('guideBody'),
      guideCloseBtn: document.getElementById('guideCloseBtn'),
      toast: document.getElementById('toast')
    };

    /* -------------------------- Utility -------------------------- */
    function shuffle(array) {
      const cloned = [...array];
      for (let i = cloned.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
      }
      return cloned;
    }

    function totalScore() {
      return Math.max(0, Math.min(100,
        state.sceneScores.order +
        state.sceneScores.match +
        state.sceneScores.select +
        state.sceneScores.quiz
      ));
    }

    function updateScore() {
      el.scoreBadge.textContent = `${totalScore()} / 100`;
    }

    function updateHUD() {
      const visibleScene = state.currentScene > 5 ? 5 : state.currentScene;
      el.sceneBadge.textContent = `${visibleScene} / 5`;
      el.progressFill.style.width = `${Math.max(20, visibleScene * 20)}%`;
      updateScore();
      updateStatus();
    }

    function updateStatus(message) {
      if (message) {
        el.statusBadge.textContent = message;
        return;
      }
      if (state.cameraRunning && state.handDetected) el.statusBadge.textContent = 'ตรวจพบมือแล้ว';
      else if (state.cameraRunning && !state.handDetected) el.statusBadge.textContent = 'ไม่พบมือ';
      else if (state.mouseMode) el.statusBadge.textContent = 'ใช้โหมดเมาส์';
      else el.statusBadge.textContent = 'พร้อมเริ่มเกม';
    }

    function formatTime(ms) {
      const total = Math.floor(ms / 1000);
      const m = String(Math.floor(total / 60)).padStart(2, '0');
      const s = String(total % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function startTimer() {
      if (state.timerInterval) return;
      state.startTime = Date.now();
      state.timerInterval = setInterval(() => {
        el.timerBadge.textContent = formatTime(Date.now() - state.startTime);
      }, 1000);
    }

    function stopTimer() {
      if (state.timerInterval) clearInterval(state.timerInterval);
      state.timerInterval = null;
    }

    function showFeedback(message, type = 'info', duration = 1800) {
      const styles = {
        success: 'text-emerald-100 border-emerald-300/40',
        error: 'text-rose-100 border-rose-300/40',
        info: 'text-cyan-100 border-cyan-300/40',
        warn: 'text-amber-100 border-amber-300/40'
      };
      el.toast.className = `fixed left-1/2 -translate-x-1/2 bottom-6 z-[100001] max-w-[92vw] glass rounded-2xl px-5 py-3 font-semibold text-center border ${styles[type] || styles.info}`;
      el.toast.textContent = message;
      el.toast.classList.remove('hidden');
      clearTimeout(el.toast._timer);
      el.toast._timer = setTimeout(() => el.toast.classList.add('hidden'), duration);
    }

    function showGuide(title, html, key) {
      if (key && state.guideWasShown.has(key)) return;
      if (key) state.guideWasShown.add(key);
      el.guideTitle.textContent = title;
      el.guideBody.innerHTML = html;
      el.guideModal.classList.remove('hidden');
      el.guideModal.classList.add('flex');
    }

    function hideGuide() {
      el.guideModal.classList.add('hidden');
      el.guideModal.classList.remove('flex');
      prepareAudio();
    }

    function prepareAudio() {
      if (state.audioReady) return;
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        state.audioCtx = new AudioContext();
        state.audioReady = true;
      } catch (err) {
        state.audioReady = false;
      }
    }

    function playTone(kind = 'success') {
      try {
        if (!state.audioCtx) return;
        const ctx = state.audioCtx;
        if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const now = ctx.currentTime;
        const config = {
          success: [660, 880, 0.08],
          error: [180, 120, 0.12],
          complete: [523, 1046, 0.16],
          click: [420, 520, 0.05]
        }[kind] || [500, 650, 0.08];
        osc.type = kind === 'error' ? 'sawtooth' : 'sine';
        osc.frequency.setValueAtTime(config[0], now);
        osc.frequency.exponentialRampToValueAtTime(config[1], now + config[2]);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.13, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + config[2] + 0.05);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + config[2] + 0.08);
      } catch (err) {
        // Audio is optional. Game must continue even if browser blocks sound.
      }
    }

    function clearDragStyle(node) {
      node.style.position = '';
      node.style.left = '';
      node.style.top = '';
      node.style.width = '';
      node.style.height = '';
      node.style.zIndex = '';
      node.style.pointerEvents = '';
      node.style.transform = '';
    }

    /* -------------------------- Camera + MediaPipe -------------------------- */
    async function startCamera() {
      if (state.cameraRunning) return stopCamera();
      try {
        updateStatus('กำลังเปิดกล้อง');

        if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
          throw new Error('MediaPipe CDN not loaded');
        }

        hands = new Hands({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
          maxNumHands: 1,
          modelComplexity: 1,
          minDetectionConfidence: 0.68,
          minTrackingConfidence: 0.58
        });

        hands.onResults(onHandResults);

        camera = new Camera(el.video, {
          onFrame: async () => {
            if (hands && state.cameraRunning) await hands.send({ image: el.video });
          },
          width: 1280,
          height: 720
        });

        await camera.start();
        state.cameraRunning = true;
        el.video.classList.add('active');
        el.cameraBtn.textContent = 'ปิดกล้อง AR';
        state.handDetected = false;
        updateStatus('ไม่พบมือ');
        showFeedback('เปิดกล้อง AR แล้ว ลองชี้นิ้วและหนีบนิ้วเพื่อหยิบวัตถุ', 'success', 2600);
      } catch (err) {
        console.error(err);
        state.cameraRunning = false;
        state.handDetected = false;
        el.video.classList.remove('active');
        el.cameraBtn.textContent = 'เปิดกล้อง AR';
        updateStatus('ใช้โหมดเมาส์');
        showFeedback('ไม่สามารถเปิดกล้องได้ กรุณาใช้โหมดเมาส์แทน', 'error', 3200);
      }
      updateHUD();
    }

    function stopCamera() {
      state.cameraRunning = false;
      state.handDetected = false;
      state.handPinching = false;
      state.lastHandPinching = false;
      el.video.classList.remove('active');
      el.arCursor.classList.remove('visible', 'pinching');
      el.cameraBtn.textContent = 'เปิดกล้อง AR';

      try {
        if (camera && typeof camera.stop === 'function') camera.stop();
      } catch (err) {}

      try {
        const stream = el.video.srcObject;
        if (stream && stream.getTracks) stream.getTracks().forEach(track => track.stop());
        el.video.srcObject = null;
      } catch (err) {}

      updateStatus('ใช้โหมดเมาส์');
      showFeedback('ปิดกล้องแล้ว สามารถเล่นด้วยเมาส์ได้ตามปกติ', 'info');
      updateHUD();
    }

    function onHandResults(results) {
      if (!state.cameraRunning) return;
      const hasHand = !!(results.multiHandLandmarks && results.multiHandLandmarks.length > 0);
      state.handDetected = hasHand;

      if (!hasHand) {
        el.arCursor.classList.remove('visible', 'pinching');
        state.lastHandPinching = state.handPinching;
        state.handPinching = false;
        updateStatus('ไม่พบมือ');
        return;
      }

      const landmarks = results.multiHandLandmarks[0];
      const indexTip = landmarks[8];
      const thumbTip = landmarks[4];
      const mapped = mapHandToScreen(indexTip.x, indexTip.y);
      const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);

      // Hysteresis makes pinch more stable.
      if (!state.handPinching && dist < 0.055) state.handPinching = true;
      if (state.handPinching && dist > 0.082) state.handPinching = false;

      updateCursor(mapped.x, mapped.y, state.handPinching);
      handlePinch(mapped.x, mapped.y, state.handPinching);
      updateStatus('ตรวจพบมือแล้ว');
    }

    function mapHandToScreen(x, y) {
      // MediaPipe returns normalized x/y from the raw video frame.
      // When the video is visually mirrored with CSS scaleX(-1), x must be inverted.
      const correctedX = state.mirrorMode ? (1 - x) : x;
      return {
        x: correctedX * window.innerWidth,
        y: y * window.innerHeight
      };
    }

    function updateCursor(x, y, pinching = false) {
      state.cursorX = x;
      state.cursorY = y;
      el.arCursor.style.left = `${x}px`;
      el.arCursor.style.top = `${y}px`;
      el.arCursor.classList.add('visible');
      el.arCursor.classList.toggle('pinching', pinching);
      if (state.dragging) moveDrag(x, y);
      highlightZoneUnderCursor(x, y);
    }

    function handlePinch(x, y, isPinching) {
      if (isPinching && !state.lastHandPinching) {
        handleVirtualDown(x, y, 'hand');
      } else if (isPinching && state.lastHandPinching) {
        handleVirtualMove(x, y, 'hand');
      } else if (!isPinching && state.lastHandPinching) {
        handleVirtualUp(x, y, 'hand');
      }
      state.lastHandPinching = isPinching;
    }

    /* -------------------------- Unified Interaction Engine -------------------------- */
    function setupDragDrop() {
      document.addEventListener('pointerdown', (event) => {
        if (!state.mouseMode) return;
        if (event.pointerType === 'mouse' || event.pointerType === 'touch' || event.pointerType === 'pen') {
          handleVirtualDown(event.clientX, event.clientY, 'mouse', event);
        }
      }, { passive: false });

      document.addEventListener('pointermove', (event) => {
        if (!state.mouseMode) return;
        if (state.dragging) {
          event.preventDefault();
          handleVirtualMove(event.clientX, event.clientY, 'mouse', event);
        }
      }, { passive: false });

      document.addEventListener('pointerup', (event) => {
        if (!state.mouseMode) return;
        if (state.dragging) {
          event.preventDefault();
          handleVirtualUp(event.clientX, event.clientY, 'mouse', event);
        }
      }, { passive: false });

      document.addEventListener('pointercancel', (event) => {
        if (state.dragging) handleVirtualUp(event.clientX, event.clientY, 'mouse', event);
      }, { passive: false });
    }

    function handleVirtualDown(x, y, source = 'mouse', originalEvent = null) {
      const target = document.elementFromPoint(x, y);
      if (!target) return;

      if (source === 'hand') {
        const button = target.closest('button');
        if (button && !button.disabled) {
          state.virtualButtonTarget = button;
          playTone('click');
          return;
        }
      }

      const selectable = target.closest('.selectable-data');
      if (selectable) {
        if (originalEvent) originalEvent.preventDefault();
        selectDataChip(selectable);
        return;
      }

      const draggable = target.closest('.draggable:not(.locked)');
      if (draggable) {
        if (originalEvent) originalEvent.preventDefault();
        startDrag(draggable, x, y);
      }
    }

    function handleVirtualMove(x, y, source = 'mouse') {
      if (state.dragging) moveDrag(x, y);
      if (source === 'hand') updateCursor(x, y, state.handPinching);
      highlightZoneUnderCursor(x, y);
    }

    function handleVirtualUp(x, y, source = 'mouse') {
      clearZoneHighlights();

      if (state.dragging) {
        const drag = state.dragging;
        const target = document.elementFromPoint(x, y);
        const zone = target ? target.closest('.drop-zone') : null;
        const ok = checkDrop(drag.el, zone);
        if (!ok) returnDragHome(drag, true);
        state.dragging = null;
        return;
      }

      if (source === 'hand' && state.virtualButtonTarget) {
        const btn = state.virtualButtonTarget;
        const rect = btn.getBoundingClientRect();
        const inside = x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
        state.virtualButtonTarget = null;
        if (inside && !btn.disabled) btn.click();
      }
    }

    function startDrag(node, x, y) {
      prepareAudio();
      const rect = node.getBoundingClientRect();
      const placeholder = document.createElement('div');
      placeholder.className = 'drag-placeholder';
      placeholder.style.width = `${rect.width}px`;
      placeholder.style.height = `${rect.height}px`;
      node.parentNode.insertBefore(placeholder, node);

      state.dragging = {
        el: node,
        placeholder,
        offsetX: x - rect.left,
        offsetY: y - rect.top,
        width: rect.width,
        height: rect.height
      };

      document.body.appendChild(node);
      node.classList.add('dragging');
      node.style.position = 'fixed';
      node.style.width = `${rect.width}px`;
      node.style.height = `${rect.height}px`;
      node.style.left = `${rect.left}px`;
      node.style.top = `${rect.top}px`;
      node.style.zIndex = '99998';
      node.style.pointerEvents = 'none';
      moveDrag(x, y);
      playTone('click');
    }

    function moveDrag(x, y) {
      const drag = state.dragging;
      if (!drag) return;
      drag.el.style.left = `${x - drag.offsetX}px`;
      drag.el.style.top = `${y - drag.offsetY}px`;
    }

    function returnDragHome(drag, withError = false) {
      const node = drag.el;
      node.classList.remove('dragging');
      clearDragStyle(node);
      drag.placeholder.replaceWith(node);
      if (withError) {
        node.classList.add('shake');
        setTimeout(() => node.classList.remove('shake'), 400);
        showFeedback('ยังไม่ตรงขั้นตอน ลองพิจารณาความหมายของการ์ดอีกครั้ง', 'error');
        playTone('error');
      }
    }

    function highlightZoneUnderCursor(x, y) {
      clearZoneHighlights();
      if (!state.dragging) return;
      const target = document.elementFromPoint(x, y);
      const zone = target ? target.closest('.drop-zone') : null;
      if (zone) zone.classList.add('active-zone');
    }

    function clearZoneHighlights() {
      document.querySelectorAll('.drop-zone.active-zone').forEach(z => z.classList.remove('active-zone'));
    }

    function checkDrop(dragNode, zone) {
      if (!zone || zone.classList.contains('zone-complete')) return false;

      const accept = zone.dataset.accept;
      const itemId = dragNode.dataset.id;
      const itemMatch = dragNode.dataset.match;
      const correct = accept === itemId || accept === itemMatch;

      if (!correct) return false;

      const drag = state.dragging;
      dragNode.classList.remove('dragging', 'draggable');
      dragNode.classList.add('locked', 'correct-card');
      clearDragStyle(dragNode);
      if (drag && drag.placeholder) drag.placeholder.remove();
      zone.appendChild(dragNode);
      zone.classList.add('zone-complete');

      if (zone.dataset.scene === 'order') {
        state.orderCorrect += 1;
        showFeedback(`ถูกต้อง: ${dragNode.dataset.label} คือขั้นตอนที่ ${zone.dataset.order}`, 'success');
        playTone('success');
        if (state.orderCorrect >= 5) {
          state.sceneScores.order = 20;
          updateScore();
          playTone('complete');
          setTimeout(() => {
            showFeedback('ยอดเยี่ยม! คุณจัดลำดับกระบวนการวิทยาการข้อมูลครบแล้ว', 'success', 2200);
            setTimeout(() => nextScene(), 1200);
          }, 350);
        }
      }

      if (zone.dataset.scene === 'match') {
        state.matchCorrect += 1;
        state.sceneScores.match = state.matchCorrect >= 5 ? 30 : state.matchCorrect * 6;
        updateScore();
        const step = GAME.steps.find(s => s.id === accept);
        showFeedback(`ถูกต้อง! กิจกรรมนี้อยู่ในขั้น “${step.full}”`, 'success', 2100);
        playTone('success');
        renderScene3NextIfReady();
      }

      return true;
    }

    /* -------------------------- Scene Rendering -------------------------- */
    function nextScene() {
      if (state.currentScene < 5) {
        state.currentScene += 1;
        renderScene();
      } else {
        showFinalResult();
      }
      updateHUD();
    }

    function selectDataChip(chip) {
      if (!chip || chip.dataset.selected === 'true' || state.scene4Done) return;
      prepareAudio();
      chip.dataset.selected = 'true';
      const correct = chip.dataset.correct === 'true';

      if (correct) {
        state.selectedCorrect += 1;
        chip.classList.add('selected-correct');
        chip.querySelector('.text-xs').textContent = 'ข้อมูลเกี่ยวข้อง ✓';
        showFeedback('เลือกถูกต้อง ข้อมูลนี้ช่วยวิเคราะห์ปัญหาการมาสายได้', 'success');
        playTone('success');
      } else {
        state.selectedWrong += 1;
        chip.classList.add('selected-wrong');
        chip.querySelector('.text-xs').textContent = 'ข้อมูลลวง ✕';
        showFeedback('ข้อมูลนี้ไม่เกี่ยวข้องกับปัญหาการมาสายมากพอ', 'error');
        playTone('error');
      }

      const selectCounter = document.getElementById('selectCounter');
      const wrongCounter = document.getElementById('wrongCounter');
      if (selectCounter) selectCounter.textContent = `เลือกถูก ${state.selectedCorrect} / 6`;
      if (wrongCounter) wrongCounter.textContent = `ข้อมูลลวง ${state.selectedWrong} / 1`;

      state.sceneScores.select = Math.max(0, Math.min(25, Math.round((state.selectedCorrect / 6) * 25) - (state.selectedWrong * 5)));
      updateScore();

      if (state.selectedWrong > 1) {
        showFeedback('เลือกข้อมูลลวงเกินกำหนด ด่านนี้จะเริ่มใหม่เพื่อให้ลองวิเคราะห์อีกครั้ง', 'warn', 3000);
        setTimeout(() => renderScene4(), 1300);
        return;
      }

      if (state.selectedCorrect >= 5 && state.selectedWrong <= 1) {
        state.scene4Done = true;
        state.sceneScores.select = Math.max(15, Math.min(25, Math.round((state.selectedCorrect / 6) * 25) - (state.selectedWrong * 5)));
        updateScore();
        const area = document.getElementById('scene4NextArea');
        if (area) {
          area.innerHTML = `

    function answerQuiz(button) {
      prepareAudio();
      const q = GAME.quiz[state.quizIndex];
      const selected = button.dataset.answer;
      const correct = selected === q.answer;
      const options = [...document.querySelectorAll('.quiz-option')];
      options.forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.answer === q.answer) btn.classList.add('correct');
      });

      if (correct) {
        button.classList.add('correct');
        state.sceneScores.quiz += q.score;
        showFeedback(q.feedback, 'success', 2400);
        playTone('success');
      } else {
        button.classList.add('wrong');
        showFeedback('ยังไม่ถูก ให้สังเกตค่าที่สูงที่สุดและข้อเสนอที่อิงจากข้อมูล', 'error', 2600);
        playTone('error');
      }
      updateScore();

      const feedback = document.getElementById('quizFeedback');
      feedback.innerHTML = `
        <div class="glass rounded-2xl p-4 border ${correct ? 'border-emerald-300/30' : 'border-rose-300/30'}">
          <div class="font-extrabold ${correct ? 'text-emerald-200' : 'text-rose-200'}">${correct ? 'ตอบถูกต้อง' : 'ตอบผิด'}</div>
          <div class="text-slate-300 mt-1">${q.feedback}</div>
          <button id="quizNextBtn" class="btn-primary rounded-2xl px-5 py-3 mt-4 font-bold">${state.quizIndex + 1 >= GAME.quiz.length ? 'ดูผลสรุป' : 'คำถามถัดไป'}</button>
        </div>`;

      document.getElementById('quizNextBtn').addEventListener('click', () => {
        state.quizIndex += 1;
        if (state.quizIndex >= GAME.quiz.length) {
          showFinalResult();
        } else {
          renderScene5(false);
        }
      });
    }

    function showFinalResult() {
      stopTimer();
      state.currentScene = 5;
      const score = totalScore();
      let level = 'ควรทบทวนกระบวนการวิทยาการข้อมูล';
      let emoji = '📘';
      let tone = 'text-rose-200';
      if (score >= 80) { level = 'นักวิทยาการข้อมูลมือโปร'; emoji = '🏆'; tone = 'text-emerald-200'; }
      else if (score >= 60) { level = 'นักวิเคราะห์ข้อมูลฝึกหัด'; emoji = '🧠'; tone = 'text-cyan-200'; }
      else if (score >= 40) { level = 'ผู้ช่วยนักสำรวจข้อมูล'; emoji = '🔎'; tone = 'text-amber-200'; }

      el.stage.innerHTML = `
        <section class="min-h-[60vh] grid place-items-center">
          <div class="glass-soft rounded-[2rem] p-6 md:p-10 max-w-5xl w-full text-center">
            <div class="text-7xl md:text-8xl mb-4">${emoji}</div>
            <div class="text-cyan-200 font-bold text-sm tracking-wide">MISSION COMPLETE</div>
            <h2 class="text-3xl md:text-5xl font-extrabold mt-2 neon-text">สรุปผลภารกิจ</h2>
            <div class="mt-7 grid md:grid-cols-2 gap-5 text-left">
              <div class="glass rounded-3xl p-6">
                <div class="text-sm text-slate-400">คะแนนรวม</div>
                <div class="text-6xl font-extrabold text-white mt-2">${score}<span class="text-2xl text-slate-400"> / 100</span></div>
                <div class="mt-4 text-2xl font-extrabold ${tone}">${level}</div>
              </div>
              <div class="glass rounded-3xl p-6">
                <h3 class="text-xl font-extrabold text-cyan-100 mb-4">คะแนนรายภารกิจ</h3>
                <div class="space-y-3 text-slate-200">
                  ${scoreRow('จัดลำดับกระบวนการ', state.sceneScores.order, 20)}
                  ${scoreRow('จับคู่กิจกรรม', state.sceneScores.match, 30)}
                  ${scoreRow('เลือกข้อมูลที่เกี่ยวข้อง', state.sceneScores.select, 25)}
                  ${scoreRow('อ่านกราฟและสรุปผล', state.sceneScores.quiz, 25)}
                </div>
              </div>
            </div>
            <div class="glass rounded-3xl p-5 md:p-6 mt-5 text-left">
              <h3 class="text-xl font-extrabold text-emerald-200 mb-2">ข้อคิดจากเกม</h3>
              <p class="text-slate-200 leading-relaxed text-lg">
                “วิทยาการข้อมูลไม่ใช่แค่การมีข้อมูลจำนวนมาก แต่คือการตั้งคำถามที่ดี เก็บข้อมูลที่เหมาะสม วิเคราะห์อย่างมีเหตุผล และสื่อสารผลลัพธ์ให้ผู้อื่นเข้าใจ”
              </p>
            </div>
            <div class="mt-7 flex flex-wrap justify-center gap-3">
              <button id="playAgainBtn" class="btn-primary rounded-2xl px-7 py-4 font-extrabold text-lg">เล่นอีกครั้ง</button>
              <button id="backIntroBtn" class="btn-secondary rounded-2xl px-6 py-4 font-bold">กลับหน้าเริ่มต้น</button>
            </div>
          </div>
        </section>`;

      document.getElementById('playAgainBtn').addEventListener('click', resetGame);
      document.getElementById('backIntroBtn').addEventListener('click', () => {
        resetGame(false);
        renderScene1();
      });
      updateHUD();
      playTone('complete');

    function scoreRow(label, value, max) {
      const percent = Math.max(0, Math.min(100, Math.round((value / max) * 100)));
      return `
        <div>
          <div class="flex justify-between gap-3 text-sm mb-1">
            <span>${label}</span><b>${value} / ${max}</b>
          </div>
          <div class="h-2.5 bg-slate-950/60 rounded-full overflow-hidden border border-white/10">
            <div class="h-full bg-gradient-to-r from-blue-500 via-cyan-400 to-emerald-400" style="width:${percent}%"></div>
          </div>
        </div>`;
    }

    /* -------------------------- Reset + Init -------------------------- */
    function resetGame(render = true) {
      stopTimer();
      state.currentScene = 1;
      state.gameStarted = false;
      state.startTime = null;
      state.dragging = null;
      state.virtualButtonTarget = null;
      state.sceneScores = { order: 0, match: 0, select: 0, quiz: 0 };
      state.orderCorrect = 0;
      state.matchCorrect = 0;
      state.selectedCorrect = 0;
      state.selectedWrong = 0;
      state.quizIndex = 0;
      state.quizAnswered = 0;
      state.scene3NextShown = false;
      state.scene4Done = false;
      state.guideWasShown = new Set();
      el.timerBadge.textContent = '00:00';
      updateHUD();
      if (render) renderScene1();
      showFeedback('เริ่มเกมใหม่แล้ว', 'info');
    }

    function initGame() {
      el.guideCloseBtn.addEventListener('click', hideGuide);
      el.cameraBtn.addEventListener('click', startCamera);
      el.resetBtn.addEventListener('click', resetGame);

      el.mouseBtn.addEventListener('click', () => {
        state.mouseMode = !state.mouseMode;
        el.mouseBtn.textContent = `โหมดเมาส์: ${state.mouseMode ? 'เปิด' : 'ปิด'}`;
        showFeedback(state.mouseMode ? 'เปิดโหมดเมาส์แล้ว' : 'ปิดโหมดเมาส์แล้ว', 'info');
        updateHUD();
      });

      el.mirrorBtn.addEventListener('click', () => {
        state.mirrorMode = !state.mirrorMode;
        el.video.classList.toggle('mirror', state.mirrorMode);
        el.mirrorBtn.textContent = `Mirror: ${state.mirrorMode ? 'เปิด' : 'ปิด'}`;
        showFeedback(state.mirrorMode ? 'เปิด Mirror แล้ว: Cursor จะกลับแกน X ให้ตรงกับภาพกระจก' : 'ปิด Mirror แล้ว: ใช้พิกัดวิดีโอตามจริง', 'info', 2400);
      });

      el.video.classList.toggle('mirror', state.mirrorMode);
      setupDragDrop();
      renderScene1();
      updateHUD();
    }

    window.addEventListener('resize', () => {
      if (state.handDetected) updateCursor(state.cursorX, state.cursorY, state.handPinching);
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden && state.dragging) {
        returnDragHome(state.dragging, false);
        state.dragging = null;
      }
    });

    window.addEventListener('load', initGame);
  </script>
</body>
</html>
